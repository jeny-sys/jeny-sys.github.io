{{ define "main" }}
<div class="home">
    <section class="home-hero">
        <h1>欢迎来到<span class="highlight">技术博客</span></h1>
        <p class="subtitle">{{ .Site.Params.description }}</p>
    </section>

    <h2 class="section-title">最新文章</h2>
    {{ range first 5 (where .Site.RegularPages "Section" "posts") }}
    <a href="{{ .Permalink }}" class="post-card">
        <h3>{{ .Title }}</h3>
        <div class="post-meta-row">
            <time>{{ .Date.Format "2006-01-02" }}</time>
        </div>
        <p>{{ .Summary }}</p>
        {{ if .Params.tags }}
        <div class="tags">
            {{ range .Params.tags }}
            <span class="tag">{{ . }}</span>
            {{ end }}
        </div>
        {{ end }}
    </a>
    {{ end }}
</div>
{{ end }}
