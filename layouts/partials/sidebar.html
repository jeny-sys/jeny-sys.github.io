<aside class="sidebar">
    <div class="sidebar-card sidebar-about">
        <h3>关于</h3>
        <p>{{ .Site.Params.author }}</p>
        <p>{{ .Site.Params.description }}</p>
    </div>

    <div class="sidebar-card">
        <h3>分类</h3>
        <ul class="categories-list">
            {{ range .Site.Taxonomies.categories }}
            <li><a href="{{ .Page.Permalink }}">{{ .Page.Title }} <span class="category-count">{{ .Count }}</span></a></li>
            {{ end }}
        </ul>
    </div>

    <div class="sidebar-card">
        <h3>标签</h3>
        <div class="tag-cloud">
            {{ range .Site.Taxonomies.tags }}
            <a href="{{ .Page.Permalink }}" class="tag">{{ .Page.Title }}</a>
            {{ end }}
        </div>
    </div>

    <div class="sidebar-card">
        <h3>链接</h3>
        <ul class="links-list">
            <li><a href="https://github.com/jeny-sys">GitHub</a></li>
            <li><a href="mailto:your@email.com">邮箱</a></li>
        </ul>
    </div>
</aside>
