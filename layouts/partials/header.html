<!-- layouts/partials/header.html -->
<header class="site-header">
    <div class="header-content">
        <a href="/" class="site-title">{{ .Site.Title }}</a>
        <nav class="main-nav">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
            {{ end }}
        </nav>
    </div>
</header>
