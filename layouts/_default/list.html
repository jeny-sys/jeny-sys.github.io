{{ define "main" }}
<div class="list-page">
    <h1>{{ .Title }}</h1>
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="post-card">
        <h3>{{ .Title }}</h3>
        <div class="post-meta-row">
            <time>{{ .Date.Format "2006-01-02" }}</time>
        </div>
        <p>{{ .Summary }}</p>
        {{ if .Params.tags }}
        <div class="tags">
            {{ range .Params.tags }}
            <span class="tag">{{ . }}</span>
            {{ end }}
        </div>
        {{ end }}
    </a>
    {{ end }}
</div>
{{ end }}
